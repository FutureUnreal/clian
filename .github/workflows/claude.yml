name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
      actions: read
    env:
      HAS_CLAUDE_KEY: ${{ secrets.CLAUDE_API_KEY != '' }}
    steps:
      - name: Skip (missing CLAUDE_API_KEY)
        if: env.HAS_CLAUDE_KEY != 'true'
        run: echo "CLAUDE_API_KEY is not configured; skipping Claude workflow."

      - name: Checkout repository
        if: env.HAS_CLAUDE_KEY == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        if: env.HAS_CLAUDE_KEY == 'true'
        id: claude
        uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.CLAUDE_BASE_URL }}
        with:
          anthropic_api_key: ${{ secrets.CLAUDE_API_KEY }}
          github_token: ${{ github.token }}
          additional_permissions: |
            actions: read
          claude_args: ${{ vars.CLAUDE_ARGS || '' }}
